<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca CEP por Endereço</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Busca de CEP</h2>
        <p>Preencha os dados abaixo para localizar o CEP:</p>
        
        <div class="form-group">
            <label>Estado (UF):</label>
            <input type="text" id="uf" placeholder="Ex: SP" maxlength="2">
        </div>

        <div class="form-group">
            <label>Cidade:</label>
            <input type="text" id="cidade" placeholder="Ex: São Paulo">
        </div>

        <div class="form-group">
            <label>Logradouro (Rua/Av):</label>
            <input type="text" id="rua" placeholder="Ex: Avenida Paulista">
        </div>

        <button onclick="buscarCEP()">Buscar CEP</button>

        <div id="resultado"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
